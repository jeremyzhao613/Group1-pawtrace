services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pawtrace
      POSTGRES_PASSWORD: pawtrace
      POSTGRES_DB: pawtrace
    ports:
      - '5432:5432'
    volumes:
      - pawtrace_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pawtrace -d pawtrace']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pawtrace_pgdata:
